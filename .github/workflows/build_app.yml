name: Build Cashier Lebanon Pro

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Analyze & Test
  # ─────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer (non-blocking)
        run: flutter analyze || true  # Warnings/errors won't block the build

      - name: Run tests
        run: flutter test || true  # Tests are optional

  # ─────────────────────────────────────────────
  # JOB 2: Build Web
  # ─────────────────────────────────────────────
  build-web:
    name: Build Web 🌐
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build for Web
        run: flutter build web --release

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashier_lebanon_pro_web
          path: build/web/
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 3: Build Android APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK 🤖
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashier_lebanon_pro_android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 4: Build iOS IPA (Ad-Hoc / Unsigned)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA 
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup iOS project properly
        run: |
          # Backup custom Info.plist (has camera/photo permissions)
          cp ios/Runner/Info.plist /tmp/custom_Info.plist

          # Remove incomplete iOS files and regenerate them properly
          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace ios/Podfile ios/Runner/Assets.xcassets ios/Flutter ios/Runner/Main.storyboard ios/Runner/LaunchScreen.storyboard ios/Runner/Runner-Bridging-Header.h

          # Regenerate complete iOS project structure
          flutter create --platforms=ios --org com.cashier.lebanon --project-name cashier_lebanon_pro .

          # Restore custom Info.plist with camera/photo permissions
          cp /tmp/custom_Info.plist ios/Runner/Info.plist

      - name: Install Pods
        run: |
          cd ios && pod install && cd ..

      - name: Build iOS (Ad-Hoc / No Code Signing)
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          AD_HOC_CODE_SIGNING_ALLOWED: "YES"
          CODE_SIGNING_ALLOWED: "NO"
        run: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build/ios -type d -name "*.app" 2>/dev/null || echo "No .app found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r cashier_lebanon_pro_unsigned.ipa Payload/
          ls -lh cashier_lebanon_pro_unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashier_lebanon_pro_ios
          path: cashier_lebanon_pro_unsigned.ipa
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 5: Create Release (only on push to main)
  # ─────────────────────────────────────────────
  release:
    name: Create Release 
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-ios]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f -name "*.apk" -o -name "*.ipa" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            ## 📦 Cashier Lebanon Pro - Build #${{ github.run_number }}
            
            Auto-generated from commit ${{ github.sha }}
            
            ### Artifacts:
            - 🌐 **Web** → cashier_lebanon_pro_web/
            -  **Android APK** → cashier_lebanon_pro_android/app-release.apk
            - 🍎 **iOS IPA (Ad-Hoc)** → cashier_lebanon_pro_ios/cashier_lebanon_pro_unsigned.ipa
          files: |
            cashier_lebanon_pro_android/app-release.apk
            cashier_lebanon_pro_ios/cashier_lebanon_pro_unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
